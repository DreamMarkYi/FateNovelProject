<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布工作台 | WORKSPACE</title>
    <!-- 引入核心字体：衬线体与西文古典字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- 引入 marked.js 用于实时解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* --- 1. 核心变量 (与主页视觉体系保持绝对一致) --- */
        :root {
            --bg-color: #FDFDFD;
            --text-main: #2C3E50;
            --text-sub: #8E9AA3;
            --accent-red: #C85A5A;
            --accent-ice: #A8D0E6;
            --border-color: rgba(0,0,0,0.08);
            --code-bg: #F4F5F7;
        }

        /* --- 2. 全局重置 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh; /* 撑满全屏 */
            overflow: hidden; /* 禁用全局滚动，改用分栏滚动 */
            display: flex;
            flex-direction: column;
        }

        /* --- 3. 极简顶栏 --- */
        header {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: #fff;
            z-index: 100;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        .actions button {
            background: none;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            padding: 6px 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            margin-left: 10px;
        }

        .actions button.primary {
            background: var(--text-main);
            color: #fff;
        }

        .actions button:hover {
            background: var(--accent-red);
            color: #fff;
            border-color: var(--accent-red);
        }

        /* --- 4. 工作区布局 (左右分栏 Flexbox) --- */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ================= 左侧：编辑区 ================= */
        .editor-pane {
            flex: 1;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: #fff;
            padding: 40px;
            overflow-y: auto;
        }

        /* 极简表单设计：去边框，仅保留底线 */
        .input-group { margin-bottom: 30px; }
        .input-group label {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
            color: var(--text-main);
            background: transparent;
        }
        .input-group input:focus { border-bottom-color: var(--accent-red); }
        .input-group input.title-input { font-size: 1.8rem; font-weight: 500; }

        /* Markdown 纯文本输入框 */
        .md-textarea {
            flex: 1; /* 占据剩余全部高度 */
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            font-family: monospace; /* 适合写代码和MD */
            font-size: 1.05rem;
            line-height: 1.8;
            color: #444;
            margin-top: 10px;
            background: transparent;
        }

        /* ================= 右侧：预览区 ================= */
        .preview-pane {
            flex: 1;
            background: #fafafa;
            overflow-y: auto;
            position: relative;
        }

        .preview-header {
            position: sticky;
            top: 0;
            background: rgba(250,250,250,0.9);
            backdrop-filter: blur(5px);
            padding: 10px 30px;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            color: var(--text-sub);
            border-bottom: 1px dashed var(--border-color);
            z-index: 10;
            letter-spacing: 2px;
        }

        /* 预览区文章样式 (严格与最终展示页保持一致) */
        .preview-content {
            padding: 50px;
            max-width: 800px;
            margin: 0 auto;
        }

        .preview-cover {
            width: 100%;
            height: 300px;
            background-color: #eee;
            background-size: cover;
            background-position: center;
            margin-bottom: 40px;
            display: none; /* 默认无图片时隐藏 */
            border: 1px solid var(--border-color);
        }

        .preview-tags {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            color: var(--accent-red);
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        .preview-title {
            font-size: 2.2rem;
            font-weight: 500;
            margin-bottom: 40px;
            line-height: 1.3;
        }

        /* Markdown 渲染后的标签样式设定 */
        .markdown-body {
            font-size: 1.05rem;
            line-height: 1.9;
            text-align: justify;
            color: #333;
        }
        .markdown-body h2 {
            font-size: 1.6rem;
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin: 40px 0 20px;
        }
        .markdown-body h3 { font-size: 1.2rem; font-weight: 500; margin: 30px 0 15px; }
        .markdown-body p { margin-bottom: 25px; }
        .markdown-body img { max-width: 100%; height: auto; margin: 30px 0; border: 1px solid var(--border-color); }
        .markdown-body video {
            width: 100%;
            max-width: 100%;
            display: block;
            margin: 30px 0;
            border: 1px solid var(--border-color);
            background: #000;
        }
        .markdown-body .mp4-link {
            margin: -18px 0 26px;
            font-size: 0.85rem;
            color: var(--text-sub);
            word-break: break-all;
        }
        .markdown-body .mp4-link a {
            color: var(--accent-red);
            text-decoration: underline;
        }
        .markdown-body blockquote {
            border-left: 3px solid var(--accent-red);
            padding-left: 20px;
            color: var(--text-sub);
            background: #fff;
            padding: 15px 20px;
            font-style: italic;
            margin: 30px 0;
        }
        .markdown-body pre {
            background: var(--text-main);
            color: #fff;
            padding: 20px;
            border-radius: 4px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.9rem;
            margin: 30px 0;
        }
        .markdown-body code {
            background: var(--code-bg);
            padding: 2px 6px;
            font-family: monospace;
            font-size: 0.9em;
            color: var(--accent-red);
        }
        .markdown-body pre code { background: transparent; color: inherit; padding: 0; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 25px; padding-left: 20px; }

        /* --- 5. 响应式布局 (窄屏自动转为上下布局) --- */
        @media (max-width: 900px) {
            .workspace { flex-direction: column; overflow: auto; }
            .editor-pane, .preview-pane { flex: none; height: auto; min-height: 60vh; overflow-y: visible; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">WORKSPACE</div>
    <div class="actions">
        <button onclick="alert('返回操作 (需配置路由)')">CANCEL</button>
        <button class="primary" onclick="alert('项目数据已保存。')">PUBLISH</button>
    </div>
</header>

<div class="workspace">

    <!-- ================= 左侧：编辑与配置区 ================= -->
    <div class="editor-pane">
        <div class="input-group">
            <label>PROJECT TITLE</label>
            <input type="text" id="input-title" class="title-input" placeholder="输入文章标题..." value="GraphRAG 与多智能体架构探索">
        </div>

        <div class="input-group">
            <label>CATEGORY / TAGS</label>
            <input type="text" id="input-tags" placeholder="例如：GRAPHICS / C# / UNITY" value="LLM / NEO4J / AGENTS">
        </div>

        <div class="input-group">
            <label>COVER IMAGE URL</label>
            <input type="text" id="input-cover" placeholder="输入图片网络链接 (http://...) 以配置封面" value="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1200&auto=format&fit=crop">
        </div>

        <label style="font-family: 'Cinzel', serif; font-size: 0.75rem; color: var(--text-sub); letter-spacing: 1.5px; margin-top: 10px; display: block;">MARKDOWN CONTENT</label>
        <div style="font-size: 0.8rem; color: var(--text-sub); margin: 8px 0 14px; line-height: 1.6;">
            支持 MP4：可直接写
            <code>!video[可选说明](./videos/demo.mp4)</code>
            或原生 HTML
            <code>&lt;video controls src="D:/videos/demo.mp4"&gt;&lt;/video&gt;</code>
        </div>

        <!-- 预设的占位文本包含了一些 Markdown 语法示例 -->
        <textarea id="input-md" class="md-textarea" placeholder="在此开始撰写正文 (支持 Markdown 语法)...">
在处理复杂知识网络的检索与推理时，传统的向量检索往往会丢失实体间的拓扑关系。

## 引入图数据库
我们利用 **Neo4j** 构建底层结构，并通过 `Leiden` 算法进行社区发现（Community Detection），这使得智能体能够以宏观视角理解文档集群。

> "数据是散落的星辰，而图谱是连接它们的星座。"

### 核心查询逻辑
以下是我们的多智能体系统中，用于查询节点关联的核心代码片段：

```cypher
// Cypher 语句示例：查找核心实体间的关联路径
MATCH (source:Entity {name: 'LLM'})-[r:RELATES_TO*1..3]-(target:Entity)
RETURN source, r, target
LIMIT 50;
```

        </textarea>
    </div>

    <!-- ================= 右侧：实时预览区 ================= -->
    <div class="preview-pane">
        <div class="preview-header">LIVE PREVIEW (所见即所得)</div>

        <div class="preview-content">
            <!-- 动态封面预览 -->
            <div id="preview-cover" class="preview-cover"></div>

            <!-- 动态标题与标签 -->
            <span id="preview-tags" class="preview-tags">LLM / NEO4J / AGENTS</span>
            <h1 id="preview-title" class="preview-title">GraphRAG 与多智能体架构探索</h1>

            <!-- Markdown 渲染目标容器 -->
            <div id="preview-md" class="markdown-body"></div>
        </div>
    </div>

</div>

<!-- ================= 核心交互脚本 ================= -->
<script>
    // 1. 获取输入端的 DOM 元素
    const titleInput = document.getElementById('input-title');
    const tagsInput = document.getElementById('input-tags');
    const coverInput = document.getElementById('input-cover');
    const mdInput = document.getElementById('input-md');

    // 2. 获取预览端的 DOM 元素
    const titlePreview = document.getElementById('preview-title');
    const tagsPreview = document.getElementById('preview-tags');
    const coverPreview = document.getElementById('preview-cover');
    const mdPreview = document.getElementById('preview-md');

    function normalizeMediaPath(rawPath) {
        const value = (rawPath || '').trim();
        if (!value) return '';

        if (/^(https?:|file:|blob:|data:)/i.test(value)) {
            return value;
        }

        // 支持 Windows 盘符路径，例如 D:\videos\demo.mp4
        if (/^[a-zA-Z]:[\\/]/.test(value)) {
            return `file:///${value.replace(/\\/g, '/')}`;
        }

        // 相对路径或站内路径，统一斜杠格式
        return value.replace(/\\/g, '/');
    }

    function escapeAttr(text) {
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function convertMp4AnchorsToVideo(htmlText) {
        const anchorPattern = /<a\s+[^>]*href="([^"]+\.mp4(?:[?#][^"]*)?)"[^>]*>([\s\S]*?)<\/a>/gi;
        return htmlText.replace(anchorPattern, (_match, rawUrl, innerText) => {
            const mediaUrl = normalizeMediaPath(rawUrl);
            const safeUrl = escapeAttr(mediaUrl);
            const plainText = innerText.replace(/<[^>]*>/g, '').trim() || rawUrl;
            const safeLabel = escapeAttr(plainText);
            return `<video controls preload="metadata" src="${safeUrl}" aria-label="${safeLabel}"></video><div class="mp4-link"><a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeLabel}</a></div>`;
        });
    }

    // 将自定义视频语法转换为 HTML5 video 标签
    // 语法：!video[可选标题](任意可访问的 mp4 路径)
    function transformVideoSyntax(mdText) {
        const videoPattern = /!video\[(.*?)\]\(([^)\r\n]+)\)/gi;
        return mdText.replace(videoPattern, (match, caption, rawVideoPath) => {
            if (!/\.mp4(?:[?#].*)?$/i.test(rawVideoPath.trim())) {
                return match;
            }

            const videoUrl = normalizeMediaPath(rawVideoPath);
            const safeCaption = (caption || '').trim();
            const escapedCaption = escapeAttr(safeCaption);
            const escapedUrl = escapeAttr(videoUrl);
            const titleAttr = safeCaption ? ` title="${escapedCaption}"` : '';
            const ariaLabel = safeCaption ? ` aria-label="${escapedCaption}"` : ' aria-label="video"';
            return `<video controls preload="metadata" src="${escapedUrl}"${titleAttr}${ariaLabel}></video>`;
        });
    }

    // 3. 定义实时更新预览的函数
    function updatePreview() {
        // 同步标题
        titlePreview.textContent = titleInput.value.trim() || '未命名项目';

        // 同步标签
        tagsPreview.textContent = tagsInput.value.trim() || 'NO TAGS';

        // 同步封面图 (通过修改 style.backgroundImage)
        const coverUrl = normalizeMediaPath(coverInput.value);
        if (coverUrl) {
            coverPreview.style.backgroundImage = `url('${coverUrl}')`;
            coverPreview.style.display = 'block'; // 有链接时显示
        } else {
            coverPreview.style.display = 'none';  // 无链接时折叠隐藏
        }

        // 调用 marked.js 解析 Markdown 并注入 HTML
        // 这里使用了 marked.parse() 方法，将左侧纯文本转换为右侧带有标签的 HTML
        try {
            const mdWithVideo = transformVideoSyntax(mdInput.value);
            const renderedHtml = marked.parse(mdWithVideo);
            mdPreview.innerHTML = convertMp4AnchorsToVideo(renderedHtml);
        } catch (e) {
            console.error("Markdown 解析错误:", e);
        }
    }

    // 4. 为所有输入框绑定 'input' 事件，实现敲击键盘即时刷新
    titleInput.addEventListener('input', updatePreview);
    tagsInput.addEventListener('input', updatePreview);
    coverInput.addEventListener('input', updatePreview);
    mdInput.addEventListener('input', updatePreview);

    // 5. 页面首次加载时，主动执行一次更新，渲染预设的占位内容
    updatePreview();
</script>

</body>
</html>
